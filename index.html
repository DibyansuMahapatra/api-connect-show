<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>c-URL — Free URL Shortener</title>
    <meta
      name="description"
      content="c-URL is a fast, free URL shortener that converts long links into clean, shareable URLs instantly. No account required."
    />
    <meta
      name="keywords"
      content="url shortener, free url shortener, shorten links, short url generator, link shortener"
    />
    <meta name="robots" content="index, follow" />

    <!-- Canonical (IMPORTANT for SEO) -->
    <link rel="canonical" href="https://your-domain.com/" />

    <!-- Theme -->
    <meta name="theme-color" content="#6366f1" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="c-URL" />
    <meta property="og:title" content="c-URL — Free URL Shortener" />
    <meta
      property="og:description"
      content="Shorten long links instantly. Clean, fast, no login required."
    />
    <meta property="og:url" content="https://your-domain.com/" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="c-URL — Free URL Shortener" />
    <meta
      name="twitter:description"
      content="Shorten long links instantly. Clean, fast, no login required."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
  </head>
  
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
